<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBOVESPA Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/1.2.1/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111720;
    --border: #1e2d3d;
    --accent: #00c896;
    --accent2: #ff6b35;
    --text: #e2eaf4;
    --muted: #546e7a;
    --up: #00c896;
    --down: #ff4757;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,150,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,150,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: -2px;
    line-height: 1;
    color: #fff;
  }

  .header-left h1 span {
    color: var(--accent);
  }

  .header-left p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .last-updated {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
  }

  .last-updated span {
    display: block;
    color: var(--accent);
    font-size: 0.8rem;
  }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
  }

  .stat-card.down::before { background: var(--down); }

  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
  }

  .stat-value.up { color: var(--up); }
  .stat-value.down { color: var(--down); }

  /* Range buttons */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .range-btns {
    display: flex;
    gap: 6px;
  }

  .range-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .range-btn:hover, .range-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,200,150,0.08);
  }

  /* Action buttons */
  .action-btns {
    display: flex;
    gap: 8px;
  }

  .btn-download {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-download:hover {
    background: #00ffb8;
    transform: translateY(-1px);
  }

  .btn-reset {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-reset:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  /* Chart */
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
  }

  .chart-hint {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  canvas {
    max-height: 480px;
  }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    gap: 16px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Error */
  .error-box {
    background: rgba(255,71,87,0.1);
    border: 1px solid var(--down);
    padding: 20px;
    color: var(--down);
    font-size: 0.8rem;
  }

  /* Footer */
  footer {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  footer p {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
  }

  footer a {
    color: var(--accent);
    text-decoration: none;
  }

  @media (max-width: 600px) {
    .range-btns { flex-wrap: wrap; }
    .stat-value { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>IBO<span>VESPA</span></h1>
      <p>B3 · São Paulo Stock Exchange Index · Daily Close</p>
    </div>
    <div class="last-updated" id="lastUpdated">
      <div class="stat-label">Last Updated</div>
      <span id="updateTime">—</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card" id="cardCurrent">
      <div class="stat-label">Current</div>
      <div class="stat-value" id="statCurrent">—</div>
    </div>
    <div class="stat-card" id="cardChange">
      <div class="stat-label">YTD Change</div>
      <div class="stat-value" id="statChange">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">All-Time High</div>
      <div class="stat-value" id="statHigh">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">All-Time Low</div>
      <div class="stat-value" id="statLow">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Data Points</div>
      <div class="stat-value" id="statCount">—</div>
    </div>
  </div>

  <div class="controls">
    <div class="range-btns">
      <button class="range-btn" onclick="setRange(1)">1Y</button>
      <button class="range-btn" onclick="setRange(3)">3Y</button>
      <button class="range-btn" onclick="setRange(5)">5Y</button>
      <button class="range-btn" onclick="setRange(10)">10Y</button>
      <button class="range-btn active" onclick="setRange(0)">ALL</button>
    </div>
    <div class="action-btns">
      <button class="btn-reset" onclick="resetZoom()">↺ Reset Zoom</button>
      <button class="btn-download" onclick="downloadCSV()">↓ Download CSV</button>
    </div>
  </div>

  <div class="chart-wrapper">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-text">Loading market data...</div>
    </div>
    <div id="errorState" style="display:none"></div>
    <canvas id="chart" style="display:none"></canvas>
    <div class="chart-hint">scroll to zoom · drag to pan</div>
  </div>

  <footer>
    <p>Source: <a href="https://finance.yahoo.com/quote/%5EBVSP/" target="_blank">Yahoo Finance ^BVSP</a> · Data delayed · For informational purposes only</p>
    <p id="footerRange">—</p>
  </footer>

</div>

<script>
let allData = [];
let chart = null;
let csvData = "";

// Format number with thousands separator
function fmt(n) {
  return n.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
}

function fmtPct(n) {
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}

// Load data
async function loadData() {
  try {
    const res = await fetch('data/ibovespa.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    allData = json.data;
    csvData = json.data;

    document.getElementById('updateTime').textContent = json.last_updated;

    // Stats
    const latest = allData[allData.length - 1];
    const yearStart = allData.find(d => d.date >= new Date().getFullYear() + '-01-01');
    const allClose = allData.map(d => d.close);
    const athVal = Math.max(...allClose);
    const atlVal = Math.min(...allClose);
    const ytdPct = yearStart ? ((latest.close - yearStart.close) / yearStart.close) * 100 : 0;

    document.getElementById('statCurrent').textContent = fmt(latest.close);
    document.getElementById('statHigh').textContent = fmt(athVal);
    document.getElementById('statLow').textContent = fmt(atlVal);
    document.getElementById('statCount').textContent = allData.length.toLocaleString();

    const changeEl = document.getElementById('statChange');
    changeEl.textContent = fmtPct(ytdPct);
    changeEl.className = 'stat-value ' + (ytdPct >= 0 ? 'up' : 'down');
    document.getElementById('cardChange').className = 'stat-card ' + (ytdPct >= 0 ? '' : 'down');

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('chart').style.display = 'block';

    buildChart(allData);
    setRange(0);

  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    const errBox = document.getElementById('errorState');
    errBox.style.display = 'block';
    errBox.innerHTML = `<div class="error-box">
      <strong>Failed to load data.</strong><br>
      Run the Python script first to generate <code>data/ibovespa.json</code><br><br>
      <small>${err.message}</small>
    </div>`;
  }
}

function buildChart(data) {
  const ctx = document.getElementById('chart').getContext('2d');

  // Gradient
  const gradient = ctx.createLinearGradient(0, 0, 0, 480);
  gradient.addColorStop(0, 'rgba(0,200,150,0.25)');
  gradient.addColorStop(1, 'rgba(0,200,150,0.0)');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => d.date),
      datasets: [{
        label: 'IBOVESPA (pts)',
        data: data.map(d => d.close),
        borderColor: '#00c896',
        borderWidth: 1.5,
        backgroundColor: gradient,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: '#00c896',
        fill: true,
        tension: 0.1,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#111720',
          borderColor: '#1e2d3d',
          borderWidth: 1,
          titleColor: '#546e7a',
          bodyColor: '#e2eaf4',
          titleFont: { family: 'DM Mono', size: 11 },
          bodyFont: { family: 'DM Mono', size: 13 },
          padding: 12,
          callbacks: {
            title: (items) => items[0].label,
            label: (item) => ' ' + fmt(item.raw) + ' pts',
          }
        },
        zoom: {
          zoom: {
            wheel: { enabled: true },
            pinch: { enabled: true },
            mode: 'x',
          },
          pan: {
            enabled: true,
            mode: 'x',
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(30,45,61,0.6)', drawTicks: false },
          ticks: {
            color: '#546e7a',
            font: { family: 'DM Mono', size: 10 },
            maxTicksLimit: 10,
            maxRotation: 0,
          },
          border: { color: '#1e2d3d' }
        },
        y: {
          position: 'right',
          grid: { color: 'rgba(30,45,61,0.6)', drawTicks: false },
          ticks: {
            color: '#546e7a',
            font: { family: 'DM Mono', size: 10 },
            callback: (v) => fmt(v),
          },
          border: { color: '#1e2d3d' }
        }
      }
    }
  });
}

function setRange(years) {
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  let filtered = allData;
  if (years > 0) {
    const cutoff = new Date();
    cutoff.setFullYear(cutoff.getFullYear() - years);
    const cutoffStr = cutoff.toISOString().split('T')[0];
    filtered = allData.filter(d => d.date >= cutoffStr);
  }

  buildChart(filtered);

  const first = filtered[0]?.date || '';
  const last = filtered[filtered.length - 1]?.date || '';
  document.getElementById('footerRange').textContent = `${first} → ${last} · ${filtered.length.toLocaleString()} trading days`;
}

function resetZoom() {
  if (chart) chart.resetZoom();
}

function downloadCSV() {
  if (!csvData.length) return;

  const headers = ['Date,Open,High,Low,Close,Volume'];
  const rows = csvData.map(d =>
    `${d.date},${d.open},${d.high},${d.low},${d.close},${d.volume}`
  );
  const blob = new Blob([headers.concat(rows).join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ibovespa_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

loadData();
</script>
</body>
</html>
